<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Uma pergunta importante...</title>

  <style>
    body {
      text-align: center;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background-color: #ffe6e6;

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    h1 {
      color: #d6336c;
      font-size: clamp(1.8rem, 5vw, 2.5rem);
    }

    .botoes {
      position: relative;
      margin-top: 20px;
    }

    button {
      padding: 12px 20px;
      font-size: clamp(1rem, 4vw, 1.2rem);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin: 10px;
    }

    #sim {
      background-color: #28a745;
      color: white;
    }

    #nao {
      background-color: #dc3545;
      color: white;
      position: absolute;
    }
  </style>
</head>

<body>

  <h1>Volta comigo? 💖</h1>

  <div class="botoes">
    <button id="sim" onclick="aceitou()">SIM 😍</button>
    <button id="nao">NÃO 😈</button>
  </div>

  <script>
    const btnNao = document.getElementById("nao");

    btnNao.addEventListener("touchstart", fugir);
    btnNao.addEventListener("mouseover", fugir);

    function fugir() {
      const largura = window.innerWidth - btnNao.offsetWidth;
      const altura = window.innerHeight - btnNao.offsetHeight;

      const x = Math.random() * largura;
      const y = Math.random() * altura;

      btnNao.style.left = x + "px";
      btnNao.style.top = y + "px";
    }

    function aceitou() {
      document.body.innerHTML = "<h1>Eu sabia 😎💘</h1>";
    }
  </script>

</body>
</html>
